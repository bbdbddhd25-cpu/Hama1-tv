<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAMA TV PRO</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Tahoma, sans-serif;
        }
        body {
            background: #0b0f19;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .categories-container {
            display: flex;
            gap: 8px;
            padding: 15px;
            overflow-x: auto;
            background: #0b0f19;
            white-space: nowrap;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .categories-container::-webkit-scrollbar {
            display: none;
        }
        .tab-btn {
            background: #111827;
            border: 1px solid #1f2937;
            color: #9ca3af;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .tab-btn.active {
            background: #8b5cf6;
            color: #fff;
            border-color: #a78bfa;
        }
        .channels-section {
            flex: 1;
            padding: 10px 15px 20px 15px;
        }
        .channels-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }
        .channel-card {
            background: #111827;
            border-radius: 14px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            border: 1px solid #1f2937;
            transition: all 0.2s ease;
            text-align: center;
        }
        .channel-card:hover {
            border-color: #8b5cf6;
        }
        .channel-logo-wrap {
            width: 100%;
            height: 95px;
            background: #1a2234;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .channel-logo {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .channel-name {
            padding: 8px 6px;
            font-size: 11px;
            font-weight: 600;
            color: #fff;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* بەشی پەڕەی سەیرکردن بە شاشەی گەورە */
        .player-view {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0b0f19;
            z-index: 50;
            flex-direction: column;
            padding: 20px;
        }
        .player-view.active {
            display: flex;
        }
        .back-btn {
            align-self: flex-start;
            background: #8b5cf6;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            margin-bottom: 15px;
        }
        .video-box-large {
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid #1f2937;
        }
        .video-box-large iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <!-- لیستی سەرەکی -->
    <div id="main-content">
        <div class="categories-container">
            <button class="tab-btn active" data-category="all">گشت</button>
            <button class="tab-btn" data-category="news">کەناڵەکان</button>
        </div>

        <div class="channels-section">
            <div class="channels-grid" id="channels-grid">
                
                <!-- تەنها کەناڵی AVA با لێنکی لایڤەکەتەوە -->
                <div class="channel-card" data-category="news" data-link="O1e76gT_KsY">
                    <div class="channel-logo-wrap">
                        <img src="https://images.unsplash.com/photo-1574375927938-d5a98e8ffe85?w=200" class="channel-logo" alt="AVA">
                    </div>
                    <span class="channel-name">AVA HD</span>
                </div>

            </div>
        </div>
    </div>

    <!-- پەڕەی بینینی ڤیدیۆ -->
    <div class="player-view" id="playerView">
        <button class="back-btn" id="backBtn">← گەڕانەوە</button>
        <div class="video-box-large" id="videoBoxLarge">
            <!-- ڤیدیۆکە لێرە بە شاشەی گەورە دەکرێتەوە -->
        </div>
    </div>

    <script>
        const tabs = document.querySelectorAll('.tab-btn');
        const channelCards = document.querySelectorAll('.channel-card');
        const mainContent = document.getElementById('main-content');
        const playerView = document.getElementById('playerView');
        const videoBoxLarge = document.getElementById('videoBoxLarge');
        const backBtn = document.getElementById('backBtn');

        tabs.forEach(tab => {
            tab.addEventListener('click', function() {
                tabs.forEach(t => t.classList.remove('active'));
                this.classList.add('active');

                let selectedCategory = this.getAttribute('data-category');

                channelCards.forEach(card => {
                    if (selectedCategory === 'all' || card.getAttribute('data-category') === selectedCategory) {
                        card.style.display = 'flex';
                    } else {
                        card.style.display = 'none';
                    }
                });
            });
        });

        channelCards.forEach(card => {
            card.addEventListener('click', function() {
                let link = this.getAttribute('data-link');
                if (link) {
                    mainContent.style.display = 'none';
                    playerView.classList.add('active');
                    videoBoxLarge.innerHTML = `
                        <iframe src="https://www.youtube.com/embed/${link}?autoplay=1" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                    `;
                }
            });
        });

        backBtn.addEventListener('click', function() {
            playerView.classList.remove('active');
            mainContent.style.display = 'block';
            videoBoxLarge.innerHTML = '';
        });
    </script>
</body>
</html>
