<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiveFootballPro - پەخشی ڕاستەوخۆ</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Tahoma, sans-serif;
        }
        body {
            background-color: #121212;
            color: #ffffff;
            padding: 20px;
        }
        header {
            text-align: center;
            margin-bottom: 25px;
            padding: 20px;
            background: #1f1f1f;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }
        header h1 {
            color: #00ff88;
            font-size: 24px;
            margin-bottom: 5px;
        }
        header p {
            color: #b3b3b3;
            font-size: 13px;
        }
        .section-title {
            font-size: 16px;
            margin: 20px 0 12px 0;
            color: #00ff88;
            border-right: 4px solid #00ff88;
            padding-right: 8px;
        }
        .live-btn-container {
            text-align: center;
            margin-bottom: 30px;
        }
        .live-btn {
            display: inline-block;
            background: linear-gradient(45deg, #ff0000, #cc0000);
            color: white;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            text-decoration: none;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(255, 0, 0, 0.4);
            transition: 0.3s;
        }
        .live-btn:hover {
            transform: scale(1.05);
            background: linear-gradient(45deg, #ff3333, #e60000);
            box-shadow: 0 6px 20px rgba(255, 0, 0, 0.6);
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }
        .card {
            background-color: #1e1e1e;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            text-decoration: none;
            color: #fff;
            display: block;
            transition: 0.3s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .card:hover {
            background-color: #2c2c2c;
            border-color: #00ff88;
            transform: translateY(-3px);
        }
        .card h3 {
            font-size: 15px;
            margin-bottom: 5px;
        }
        .card p {
            font-size: 11px;
            color: #00ff88;
        }
        footer {
            text-align: center;
            color: #666;
            font-size: 12px;
            margin-top: 40px;
            border-top: 1px solid #222;
            padding-top: 15px;
        }
    </style>
</head>
<body>

    <header>
        <h1>LiveFootballPro</h1>
        <p>پەخشی ڕاستەوخۆی یارییەکان و کەناڵە وەرزشییەکان</p>
    </header>

    <!-- دوگمەی سەرەکی بۆ کردنەوەی لایڤ -->
    <div class="section-title">پەخشی ڕاستەوخۆی یارییەکان</div>
    <div class="live-btn-container">
        <a href="https://www.youtube.com/live/CJt0iqo8pBQ?si=Sl7JQEIRmU8FKch9" target="_blank" class="live-btn">
            🔴 سەیرکردنی لایڤ لە یوتیوب
        </a>
    </div>

    <!-- بەشی کەناڵەکان -->
    <div class="section-title">کەناڵە بەردەستەکان</div>
    <div class="grid-container">
        <!-- دەتوانیت لە داهاتوودا لینکی کەناڵی تریش لێرە دابنێیت -->
        <a href="https://www.youtube.com/live/CJt0iqo8pBQ?si=Sl7JQEIRmU8FKch9" target="_blank" class="card">
            <h3>⚽ Bein Sports</h3>
            <p>کردنەوەی لایڤ</p>
        </a>
        <a href="https://www.youtube.com/results?search_query=NRT+Sport+live" target="_blank" class="card">
            <h3>📺 NRT Sport</h3>
            <p>گەڕان بۆ لایڤ</p>
        </a>
    </div>

    <footer>
        <p>&copy; 2026 - LiveFootballPro. هەموو مافەکان پارێزراون.</p>
    </footer>

</body>
</html>
