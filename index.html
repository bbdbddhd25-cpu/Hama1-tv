<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAMA TV PRO</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Tahoma, sans-serif;
        }
        body {
            background: #0b0f19;
            color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .player-container {
            background: #111827;
            padding: 12px;
            display: flex;
            flex-direction: column;
            border-bottom: 1px solid #1f2937;
        }
        .player-top-bar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            margin-bottom: 10px;
        }
        .player-actions {
            display: flex;
            gap: 8px;
        }
        .action-btn {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #fff;
        }
        .share-btn { background: #8b5cf6; }
        .close-btn { background: #ef4444; }
        
        .video-box {
            width: 100%;
            height: 210px;
            background: #1f2937;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            text-align: center;
            padding: 20px;
        }
        .video-state-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .video-placeholder-icon {
            width: 50px;
            height: 50px;
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        .video-message {
            font-size: 13px;
            color: #f87171;
            font-weight: bold;
        }
        .video-subtext {
            font-size: 11px;
            color: #9ca3af;
        }

        .channels-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: #0b0f19;
        }
        .channels-title {
            padding: 12px 15px;
            font-size: 12px;
            color: #9ca3af;
            font-weight: bold;
            letter-spacing: 0.5px;
        }
        .channels-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 10px 10px 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .channel-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            background: #111827;
            border-radius: 12px;
            text-decoration: none;
            color: #fff;
            transition: all 0.2s ease;
            border: 1px solid transparent;
            cursor: pointer;
        }
        .channel-item:hover {
            background: #1f2937;
        }
        .channel-item.active {
            background: #8b5cf6;
            border-color: #a78bfa;
        }
        .channel-logo {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            object-fit: cover;
            background: #374151;
        }
        .channel-name {
            font-size: 13px;
            font-weight: 600;
        }
        .channels-list::-webkit-scrollbar {
            width: 4px;
        }
        .channels-list::-webkit-scrollbar-thumb {
            background: #374151;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div class="player-container">
        <div class="player-top-bar">
            <div class="player-actions">
                <button class="action-btn share-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
                </button>
                <button class="action-btn close-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
        </div>

        <div class="video-box" id="video-box">
            <div class="video-state-content" id="player-content">
                <div class="video-placeholder-icon">⚠️</div>
                <div class="video-message">Stream error. AVA HD has no link.</div>
                <div class="video-subtext">تکایە لینکێک بۆ ئەم کەناڵە دابنە</div>
            </div>
        </div>
    </div>

    <div class="channels-section">
        <div class="channels-title">ALL CHANNELS</div>
        <div class="channels-list">
            
            <div class="channel-item active" data-link="" data-name="AVA HD">
                <img src="https://images.unsplash.com/photo-1574375927938-d5a98e8ffe85?w=100" class="channel-logo" alt="AVA">
                <span class="channel-name">AVA HD</span>
            </div>

            <div class="channel-item" data-link="" data-name="Rudaw HD">
                <img src="https://images.unsplash.com/photo-1504711434969-e33886168f5c?w=100" class="channel-logo" alt="Rudaw">
                <span class="channel-name">Rudaw HD</span>
            </div>

            <div class="channel-item" data-link="" data-name="Channel 8">
                <img src="https://images.unsplash.com/photo-1522869635100-9f4c5e86aa37?w=100" class="channel-logo" alt="Channel 8">
                <span class="channel-name">Channel 8</span>
            </div>

            <div class="channel-item" data-link="" data-name="Kurdistan TV">
                <img src="https://images.unsplash.com/photo-1522869635100-9f4c5e86aa37?w=100" class="channel-logo" alt="Kurdistan TV">
                <span class="channel-name">Kurdistan TV</span>
            </div>

            <div class="channel-item" data-link="" data-name="Kurdsat HD">
                <img src="https://images.unsplash.com/photo-1508098682722-e99c43a406b2?w=100" class="channel-logo" alt="Kurdsat">
                <span class="channel-name">Kurdsat HD</span>
            </div>

            <div class="channel-item" data-link="" data-name="KurdMax Sorani HD">
                <img src="https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=100" class="channel-logo" alt="KurdMax">
                <span class="channel-name">KurdMax Sorani HD</span>
            </div>

            <div class="channel-item" data-link="" data-name="NRT HD">
                <img src="https://images.unsplash.com/photo-1585829365295-ab7cd400c167?w=100" class="channel-logo" alt="NRT">
                <span class="channel-name">NRT HD</span>
            </div>

            <div class="channel-item" data-link="" data-name="NRT Sports">
                <img src="https://images.unsplash.com/photo-1508098682722-e99c43a406b2?w=100" class="channel-logo" alt="NRT Sports">
                <span class="channel-name">NRT Sports</span>
            </div>

        </div>
    </div>

    <script>
        const items = document.querySelectorAll('.channel-item');
        const playerContent = document.getElementById('player-content');

        items.forEach(item => {
            item.addEventListener('click', function() {
                items.forEach(i => i.classList.remove('active'));
                this.classList.add('active');

                let link = this.getAttribute('data-link');
                let name = this.getAttribute('data-name');

                // کۆنتڕۆڵی توند: هەر کەناڵێک لینکەکەی بەتاڵ بێت، تەنها پەیامی هەڵە پیشان دەدات و خاڵی کۆتاییە
                if (!link || link.trim() === '' || link === '#') {
                    playerContent.innerHTML = `
                        <div class="video-placeholder-icon">⚠️</div>
                        <div class="video-message">Stream error. ${name} has no link.</div>
                        <div class="video-subtext">تکایە لینکێک بۆ ئەم کەناڵە دابنە</div>
                    `;
                    return; // ڕێگری دەکات لەوەی هیچ کارێکی تر بکرێت
                }

                // ئەم بەشە تەنها ئەوکاتە کار دەکات کە لە داهاتوودا خۆت لینکی ڕاستەقینەی بۆ دابنێیت
                playerContent.innerHTML = `
                    <div class="video-placeholder-icon" style="background: rgba(56, 189, 248, 0.15); color: #38bdf8;">📺</div>
                    <div class="video-message" style="color: #38bdf8;">${name} - لایڤەکە دەستی پێکرد</div>
                    <div class="video-subtext">لینکی لایڤ بە سەرکەوتوویی کرایەوە</div>
                `;
                window.open(link, '_blank');
            });
        });
    </script>

</body>
</html>
