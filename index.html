<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAMA TV PRO</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Tahoma, sans-serif;
        }
        body {
            background: #0b0f19;
            color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        /* بەشی سەرەوە (پلەیری ڤیدیۆ) */
        .player-container {
            background: #111827;
            padding: 12px;
            display: flex;
            flex-direction: column;
            border-bottom: 1px solid #1f2937;
        }
        .player-top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .error-badge {
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.3);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .player-actions {
            display: flex;
            gap: 8px;
        }
        .action-btn {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #fff;
        }
        .share-btn {
            background: #8b5cf6;
        }
        .close-btn {
            background: #ef4444;
        }
        .video-box {
            width: 100%;
            height: 210px;
            background: #1f2937;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        .video-placeholder-icon {
            width: 50px;
            height: 50px;
            background: #374151;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #9ca3af;
            font-size: 20px;
            margin-bottom: 10px;
        }
        .video-controls {
            position: absolute;
            bottom: 0;
            width: 100%;
            padding: 8px 12px;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 11px;
            color: #9ca3af;
        }
        .video-progress {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: #4b5563;
        }
        .video-progress-bar {
            width: 0%;
            height: 100%;
            background: #38bdf8;
        }

        /* بەشی خوارەوە (لیستی کەناڵەکان) */
        .channels-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: #0b0f19;
        }
        .channels-title {
            padding: 12px 15px;
            font-size: 12px;
            color: #9ca3af;
            font-weight: bold;
            letter-spacing: 0.5px;
        }
        .channels-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 10px 10px 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .channel-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            background: #111827;
            border-radius: 12px;
            text-decoration: none;
            color: #fff;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }
        .channel-item:hover, .channel-item.active {
            background: #8b5cf6;
            border-color: #a78bfa;
        }
        .channel-logo {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            object-fit: cover;
            background: #374151;
        }
        .channel-name {
            font-size: 13px;
            font-weight: 600;
        }

        /* Scrollbar styling */
        .channels-list::-webkit-scrollbar {
            width: 4px;
        }
        .channels-list::-webkit-scrollbar-thumb {
            background: #374151;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <!-- بەشی سەرەوەی پلەیەر -->
    <div class="player-container">
        <div class="player-top-bar">
            <div class="error-badge">
                ⚠️ Stream error. This channel...
            </div>
            <div class="player-actions">
                <button class="action-btn share-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
                </button>
                <button class="action-btn close-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
        </div>

        <div class="video-box">
            <div class="video-placeholder-icon">📺</div>
            <div class="video-controls">
                <span>0:00</span>
                <div style="display: flex; gap: 12px;">
                    <span>🔇</span>
                    <span>⛶</span>
                    <span>⋮</span>
                </div>
            </div>
            <div class="video-progress">
                <div class="video-progress-bar"></div>
            </div>
        </div>
    </div>

    <!-- بەشی خوارەوە - لیستی کەناڵەکان -->
    <div class="channels-section">
        <div class="channels-title">ALL CHANNELS</div>
        <div class="channels-list">
            
            <a href="#" class="channel-item active">
                <img src="https://images.unsplash.com/photo-1585829365295-ab7cd400c167?w=100" class="channel-logo" alt="AVA">
                <span class="channel-name">AVA HD</span>
            </a>

            <a href="https://www.youtube.com/@RudawArabic/live" target="_blank" class="channel-item">
                <img src="https://images.unsplash.com/photo-1504711434969-e33886168f5c?w=100" class="channel-logo" alt="Rudaw">
                <span class="channel-name">Rudaw HD</span>
            </a>

            <a href="#" class="channel-item">
                <img src="https://images.unsplash.com/photo-1522869635100-9f4c5e86aa37?w=100" class="channel-logo" alt="Channel 8">
                <span class="channel-name">Channel 8</span>
            </a>

            <a href="#" class="channel-item">
                <img src="https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=100" class="channel-logo" alt="Al-hadath">
                <span class="channel-name">Al-hadath</span>
            </a>

            <a href="#" class="channel-item">
                <img src="https://images.unsplash.com/photo-1517604931442-7e0c8ed2963c?w=100" class="channel-logo" alt="Arabia">
                <span class="channel-name">Arabia</span>
            </a>

            <a href="#" class="channel-item">
                <img src="https://images.unsplash.com/photo-1574375927938-d5a98e8ffe85?w=100" class="channel-logo" alt="Kurdistan TV">
                <span class="channel-name">Kurdistan TV</span>
            </a>

            <a href="https://www.youtube.com/@KurdsatOfficial/live" target="_blank" class="channel-item">
                <img src="https://images.unsplash.com/photo-1508098682722-e99c43a406b2?w=100" class="channel-logo" alt="Kurdsat">
                <span class="channel-name">Kurdsat HD</span>
            </a>

            <a href="https://www.youtube.com/@KurdmaxTV/live" target="_blank" class="channel-item">
                <img src="https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=100" class="channel-logo" alt="KurdMax">
                <span class="channel-name">KurdMax Sorani HD</span>
            </a>

            <a href="https://www.youtube.com/@NRT1/live" target="_blank" class="channel-item">
                <img src="https://images.unsplash.com/photo-1585829365295-ab7cd400c167?w=100" class="channel-logo" alt="NRT">
                <span class="channel-name">NRT HD</span>
            </a>

            <a href="https://www.youtube.com/@NRTSportOfficial/live" target="_blank" class="channel-item">
                <img src="https://images.unsplash.com/photo-1508098682722-e99c43a406b2?w=100" class="channel-logo" alt="NRT Sports">
                <span class="channel-name">NRT Sports</span>
            </a>

        </div>
    </div>

</body>
</html>
