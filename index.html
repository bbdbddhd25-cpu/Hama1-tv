<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAMA TV PRO</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Tahoma, sans-serif;
        }
        body {
            background: #0b0f19;
            color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .player-container {
            background: #111827;
            padding: 12px;
            display: flex;
            flex-direction: column;
            border-bottom: 1px solid #1f2937;
            flex-shrink: 0;
        }
        .player-top-bar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            margin-bottom: 10px;
        }
        .player-actions {
            display: flex;
            gap: 8px;
        }
        .action-btn {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #fff;
        }
        .share-btn { background: #8b5cf6; }
        .close-btn { background: #ef4444; }
        
        .video-box {
            width: 100%;
            height: 180px;
            background: #1f2937;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            text-align: center;
        }
        .video-box iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .video-state-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            padding: 15px;
        }
        .video-placeholder-icon {
            width: 40px;
            height: 40px;
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }
        .video-message {
            font-size: 12px;
            color: #f87171;
            font-weight: bold;
        }
        .video-subtext {
            font-size: 10px;
            color: #9ca3af;
        }

        .categories-container {
            display: flex;
            gap: 8px;
            padding: 12px 15px;
            overflow-x: auto;
            background: #0b0f19;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .categories-container::-webkit-scrollbar {
            display: none;
        }
        .tab-btn {
            background: #111827;
            border: 1px solid #1f2937;
            color: #9ca3af;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .tab-btn:hover {
            background: #1f2937;
            color: #fff;
        }
        .tab-btn.active {
            background: #8b5cf6;
            color: #fff;
            border-color: #a78bfa;
        }

        .channels-section {
            flex: 1;
            overflow-y: auto;
            padding: 5px 15px 15px 15px;
            background: #0b0f19;
        }
        .channels-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }
        .channel-card {
            background: #111827;
            border-radius: 14px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            border: 1px solid #1f2937;
            transition: all 0.2s ease;
            text-align: center;
        }
        .channel-card:hover {
            border-color: #8b5cf6;
        }
        .channel-card.selected {
            border-color: #a78bfa;
            background: rgba(139, 92, 246, 0.15);
        }
        .channel-logo-wrap {
            width: 100%;
            height: 95px;
            background: #1a2234;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .channel-logo {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .channel-name {
            padding: 8px 6px;
            font-size: 11px;
            font-weight: 600;
            color: #fff;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .channels-section::-webkit-scrollbar {
            width: 4px;
        }
        .channels-section::-webkit-scrollbar-thumb {
            background: #374151;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div class="player-container">
        <div class="player-top-bar">
            <div class="player-actions">
                <button class="action-btn share-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
                </button>
                <button class="action-btn close-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
        </div>

        <div class="video-box" id="video-box">
            <div class="video-state-content" id="player-content">
                <div class="video-placeholder-icon">📺</div>
                <div class="video-message" style="color: #9ca3af;">فیلمێک یان کەناڵێک هەڵبژێرە</div>
                <div class="video-subtext">Select a movie or channel to watch</div>
            </div>
        </div>
    </div>

    <div class="categories-container">
        <button class="tab-btn active" data-category="all">گشت</button>
        <button class="tab-btn" data-category="news">هەواڵەکان</button>
        <button class="tab-btn" data-category="sport">وەرزش</button>
        <button class="tab-btn" data-category="movies">فلیمه‌کان</button>
    </div>

    <div class="channels-section">
        <div class="channels-grid" id="channels-grid">
            
            <!-- کەناڵەکانی هەواڵ و وەرزش -->
            <div class="channel-card" data-category="news" data-name="Rudaw HD">
                <div class="channel-logo-wrap">
                    <img src="https://images.unsplash.com/photo-1504711434969-e33886168f5c?w=200" class="channel-logo" alt="Rudaw">
                </div>
                <span class="channel-name">ڕووداو HD</span>
            </div>

            <div class="channel-card" data-category="sport" data-name="NRT Sports">
                <div class="channel-logo-wrap">
                    <img src="https://images.unsplash.com/photo-1517649763962-0c623066013b?w=200" class="channel-logo" alt="NRT Sports">
                </div>
                <span class="channel-name">نێن ئار تی سپۆرت</span>
            </div>

            <!-- ٦ فیلمە دیاریکراوەکەی بەشی فلیمه‌کان -->
            <div class="channel-card" data-category="movies" data-name="فیلمی یەکەم">
                <div class="channel-logo-wrap">
                    <img src="https://images.unsplash.com/photo-1485846234645-a62644f84728?w=200" class="channel-logo" alt="Movie 1">
                </div>
                <span class="channel-name">فیلمی یەکەم</span>
            </div>

            <div class="channel-card" data-category="movies" data-name="فیلمی دووەم">
                <div class="channel-logo-wrap">
                    <img src="https://images.unsplash.com/photo-1485846234645-a62644f84728?w=200" class="channel-logo" alt="Movie 2">
                </div>
                <span class="channel-name">فیلمی دووەم</span>
            </div>

            <div class="channel-card" data-category="movies" data-name="فیلمی سێیەم">
                <div class="channel-logo-wrap">
                    <img src="https://images.unsplash.com/photo-1485846234645-a62644f84728?w=200" class="channel-logo" alt="Movie 3">
                </div>
                <span class="channel-name">فیلمی سێیەم</span>
            </div>

            <div class="channel-card" data-category="movies" data-name="فیلمی چوارەم">
                <div class="channel-logo-wrap">
                    <img src="https://images.unsplash.com/photo-1485846234645-a62644f84728?w=200" class="channel-logo" alt="Movie 4">
                </div>
                <span class="channel-name">فیلمی چوارەم</span>
            </div>

            <div class="channel-card" data-category="movies" data-name="فیلمی پێنجەم">
                <div class="channel-logo-wrap">
                    <img src="https://images.unsplash.com/photo-1485846234645-a62644f84728?w=200" class="channel-logo" alt="Movie 5">
                </div>
                <span class="channel-name">فیلمی پێنجەم</span>
            </div>

            <div class="channel-card" data-category="movies" data-name="فیلمی شەشەم">
                <div class="channel-logo-wrap">
                    <img src="https://images.unsplash.com/photo-1485846234645-a62644f84728?w=200" class="channel-logo" alt="Movie 6">
                </div>
                <span class="channel-name">فیلمی شەشەم</span>
            </div>

        </div>
    </div>

    <script>
        const tabs = document.querySelectorAll('.tab-btn');
        const channelCards = document.querySelectorAll('.channel-card');
        const videoBox = document.getElementById('video-box');

        tabs.forEach(tab => {
            tab.addEventListener('click', function() {
                tabs.forEach(t => t.classList.remove('active'));
                this.classList.add('active');

                let selectedCategory = this.getAttribute('data-category');

                channelCards.forEach(card => {
                    if (selectedCategory === 'all' || card.getAttribute('data-category') === selectedCategory) {
                        card.style.display = 'flex';
                    } else {
                        card.style.display = 'none';
                    }
                });
            });
        });

        channelCards.forEach(card => {
            card.addEventListener('click', function(e) {
                e.preventDefault();
                
                channelCards.forEach(c => c.classList.remove('selected'));
                this.classList.add('selected');

                let name = this.getAttribute('data-name');
                let link = this.getAttribute('data-link');

                if (link) {
                    videoBox.innerHTML = `
                        <iframe src="https://www.youtube.com/embed/${link}?autoplay=1" title="${name}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                    `;
                } else {
                    videoBox.innerHTML = `
                        <div class="video-state-content">
                            <div class="video-placeholder-icon">⚠️</div>
                            <div class="video-message">هیچ لینکێک بۆ (${name}) نەدۆزرایەوە.</div>
                            <div class="video-subtext">تکایە چاوەڕێی لینکەکان بە</div>
                        </div>
                    `;
                }
            });
        });
    </script>

</body>
</html>
