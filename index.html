<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAMA TV PRO</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Tahoma, sans-serif;
        }
        body {
            background: #0b0f19;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* بەشی سەرەکی و پۆلێنکردن */
        .categories-container {
            display: flex;
            gap: 8px;
            padding: 15px;
            overflow-x: auto;
            background: #0b0f19;
            white-space: nowrap;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .categories-container::-webkit-scrollbar {
            display: none;
        }
        .tab-btn {
            background: #111827;
            border: 1px solid #1f2937;
            color: #9ca3af;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .tab-btn:hover {
            background: #1f2937;
            color: #fff;
        }
        .tab-btn.active {
            background: #8b5cf6;
            color: #fff;
            border-color: #a78bfa;
        }

        /* لیستی کەناڵ و فیلمەکان */
        .channels-section {
            flex: 1;
            padding: 10px 15px 20px 15px;
        }
        .channels-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }
        .channel-card {
            background: #111827;
            border-radius: 14px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            border: 1px solid #1f2937;
            transition: all 0.2s ease;
            text-align: center;
        }
        .channel-card:hover {
            border-color: #8b5cf6;
        }
        .channel-logo-wrap {
            width: 100%;
            height: 95px;
            background: #1a2234;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .channel-logo {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .channel-name {
            padding: 8px 6px;
            font-size: 11px;
            font-weight: 600;
            color: #fff;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* شاشەی بینینی ڤیدیۆ (Modal) کە کاتێک کلیک دەکرێت دەردەکەوێت */
        .modal-player {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 100;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal-player.active {
            display: flex;
        }
        .modal-video-box {
            width: 100%;
            max-width: 800px;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        .modal-video-box iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .close-modal-btn {
            margin-top: 20px;
            background: #ef4444;
            color: #fff;
            border: none;
            padding: 10px 25px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
        }
        .close-modal-btn:hover {
            background: #dc2626;
        }
    </style>
</head>

    <!-- پەنجەرەی شاشەی تەواوی ڤیدیۆ -->
    <div class="modal-player" id="modalPlayer">
        <div class="modal-video-box" id="modalVideoBox">
            <!-- ڤیدیۆکەی تێدا دادەنرێت -->
        </div>
        <button class="close-modal-btn" id="closeModalBtn">داخستنی ڤیدیۆ</button>
    </div>

    <script>
        const tabs = document.querySelectorAll('.tab-btn');
        const channelCards = document.querySelectorAll('.channel-card');
        const modalPlayer = document.getElementById('modalPlayer');
        const modalVideoBox = document.getElementById('modalVideoBox');
        const closeModalBtn = document.getElementById('closeModalBtn');

        tabs.forEach(tab => {
            tab.addEventListener('click', function() {
                tabs.forEach(t => t.classList.remove('active'));
                this.classList.add('active');

                let selectedCategory = this.getAttribute('data-category');

                channelCards.forEach(card => {
                    if (selectedCategory === 'all' || card.getAttribute('data-category') === selectedCategory) {
                        card.style.display = 'flex';
                    } else {
                        card.style.display = 'none';
                    }
                });
            });
        });

        channelCards.forEach(card => {
            card.addEventListener('click', function(e) {
                e.preventDefault();
                
                let name = this.getAttribute('data-name');
                let link = this.getAttribute('data-link');

                if (link) {
                    modalVideoBox.innerHTML = `
                        <iframe src="https://www.youtube.com/embed/${link}?autoplay=1" title="${name}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                    `;
                    modalPlayer.classList.add('active');
                } else {
                    alert('لینک بەردەست نییە بۆ ئەم کەناڵە');
                }
            });
        });

        closeModalBtn.addEventListener('click', function() {
            modalPlayer.classList.remove('active');
            modalVideoBox.innerHTML = ''; // بۆ ئەوەی ڤیدیۆکە ڕاوەستێت کاتێک داخرا
        });
    </script>
