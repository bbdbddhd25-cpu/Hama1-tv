<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ئامانج تیڤی - پەخشی ڕاستەخۆ</title>
    <style>
        body {
            background-color: #0f1016;
            color: #ffffff;
            font-family: Tahoma, sans-serif;
            margin: 0;
            padding: 0;
        }
        header {
            text-align: center;
            padding: 20px;
            background-color: #1a1c29;
            border-bottom: 1px solid #2a2e43;
        }
        .menu {
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 15px;
            background-color: #151722;
        }
        .menu button {
            background-color: #2b245c;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
        }
        .container {
            padding: 20px;
            text-align: center;
        }
        /* بۆ بەشی دانانی پەخشی کەناڵ یان ڤیدیۆ */
        .player-box {
            width: 100%;
            max-width: 800px;
            height: 450px;
            background-color: #1a1c29;
            margin: 20px auto;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #2a2e43;
        }
    </style>
</head>
<body>

    <header>
        <h2>ئامانج تیڤی</h2>
    </header>

    <div class="menu">
        <button>گشت</button>
        <button>فیلمەکان</button>
        <button>هەواڵەکان</button>
        <button>وەرزش</button>
    </div>

    <div class="container">
        <p>کەناڵەکان یان پەخشی ڕاستەخۆ لێرە دەردەکەون</p>
        <div class="player-box">
            <!-- لێرەدا دەتوانیت کۆدی ئێمبەدی کەناڵ یان پلەیەر دابنێیت -->
            <span>لینک یان ڤیدیۆی کەناڵ لێرە دادەنرێت</span>
        </div>
    </div>

</body>
</html>
